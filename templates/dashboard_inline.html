<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ダッシュボード - 求職者データ分析</title>
    <!-- CDN統合: jsdelivr.net に一本化（HTTP/2マルチプレキシング最適化） -->
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js" as="script">
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js" as="script">
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/htmx.org@2.0.4/dist/htmx.min.js" as="script">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { navy: { 900: '#0d1525', 800: '#0f172a', 700: '#1e293b' } } } }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.4/dist/htmx.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js" defer></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js" defer></script>
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body class="bg-navy-900 text-slate-100 min-h-screen">
    <header class="bg-navy-800 border-b border-slate-700 px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <h1 class="text-lg font-bold text-white">求職者市場分析ダッシュボード</h1>
            <label for="job-type-select" class="sr-only">職種選択</label>
            <select id="job-type-select" aria-label="職種選択"
                class="bg-navy-700 border border-slate-600 rounded-lg px-3 py-1.5 text-sm text-white">
                {{JOB_OPTIONS}}
            </select>
            <span class="text-slate-400 text-sm">📍</span>
            <label for="pref-select" class="sr-only">都道府県選択</label>
            <select id="pref-select" aria-label="都道府県選択"
                class="bg-navy-700 border border-slate-600 rounded-lg px-3 py-1.5 text-sm text-white">
                <option value="">全国</option>
                {{PREF_OPTIONS}}
            </select>
            <label for="muni-select" class="sr-only">市区町村選択</label>
            <div id="muni-wrapper" style="display:inline-flex;align-items:center;gap:6px;">
                <select id="muni-select" aria-label="市区町村選択"
                    class="bg-navy-700 border border-slate-600 rounded-lg px-3 py-1.5 text-sm text-white">
                    <option value="">すべて</option>
                    {{MUNI_OPTIONS}}
                </select>
                <div id="muni-chips" class="muni-chips"></div>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-slate-400 text-sm">ログイン: {{USER_EMAIL}}</span>
            <a href="/logout" class="text-slate-400 hover:text-white text-sm transition">ログアウト</a>
        </div>
    </header>

    {{TURSO_WARNING}}

    <div class="tab-scroll-container bg-navy-800 border-b border-slate-700">
        <div class="tab-scroll-fade-left tab-scroll-fade-hidden" id="tab-fade-left"></div>
        <button class="tab-scroll-arrow tab-scroll-arrow-left tab-scroll-fade-hidden" id="tab-arrow-left" aria-label="タブを左にスクロール">&lsaquo;</button>
        <nav id="tab-nav" class="px-6 flex gap-1 overflow-x-auto" role="tablist" aria-label="ダッシュボードタブ" style="scrollbar-width:none;-ms-overflow-style:none;">
            <button class="tab-btn active" role="tab" aria-selected="true" tabindex="0" hx-get="/tab/overview" hx-target="#content" hx-swap="innerHTML"
                onclick="setActiveTab(this)">📊 市場概況</button>
            <button class="tab-btn" role="tab" aria-selected="false" tabindex="-1" hx-get="/tab/demographics" hx-target="#content" hx-swap="innerHTML"
                onclick="setActiveTab(this)">👥 求職者の特徴</button>
            <button class="tab-btn" role="tab" aria-selected="false" tabindex="-1" hx-get="/tab/mobility" hx-target="#content" hx-swap="innerHTML"
                onclick="setActiveTab(this)">🗺️ 地域・移動パターン</button>
            <button class="tab-btn" role="tab" aria-selected="false" tabindex="-1" hx-get="/tab/balance" hx-target="#content" hx-swap="innerHTML"
                onclick="setActiveTab(this)">⚖️ 需給バランス</button>
            <button class="tab-btn" role="tab" aria-selected="false" tabindex="-1" hx-get="/tab/workstyle" hx-target="#content" hx-swap="innerHTML"
                onclick="setActiveTab(this)">📈 雇用形態分析</button>
            <button class="tab-btn" role="tab" aria-selected="false" tabindex="-1" hx-get="/tab/jobmap" hx-target="#content" hx-swap="innerHTML"
                onclick="setActiveTab(this)">🗺️ 地図分析</button>
            <button class="tab-btn" role="tab" aria-selected="false" tabindex="-1" hx-get="/tab/competitive" hx-target="#content" hx-swap="innerHTML"
                onclick="setActiveTab(this)">🔍 競合調査</button>
            <button class="tab-btn" role="tab" aria-selected="false" tabindex="-1" hx-get="/tab/analysis" hx-target="#content" hx-swap="innerHTML"
                onclick="setActiveTab(this)">📊 市場分析</button>
            <button class="tab-btn" role="tab" aria-selected="false" tabindex="-1" hx-get="/tab/segment" hx-target="#content" hx-swap="innerHTML"
                onclick="setActiveTab(this)">🎯 セグメント分析</button>
            <!-- 職種比較: 一旦非表示 -->
            <!-- <button class="tab-btn" role="tab" aria-selected="false" tabindex="-1" hx-get="/tab/compare" hx-target="#content" hx-swap="innerHTML"
                onclick="setActiveTab(this)">⚖️ 職種比較</button> -->
            <!-- job_creator: 未実装のため非表示 -->
            <!-- <button class="tab-btn" role="tab" aria-selected="false" tabindex="-1" hx-get="/tab/job_creator" hx-target="#content" hx-swap="innerHTML"
                onclick="setActiveTab(this)">✏️ 求人作成</button> -->
        </nav>
        <div class="tab-scroll-fade-right" id="tab-fade-right"></div>
        <button class="tab-scroll-arrow tab-scroll-arrow-right" id="tab-arrow-right" aria-label="タブを右にスクロール">&rsaquo;</button>
    </div>

    <!-- ブレッドクラム: 現在の選択状態を表示 -->
    <div id="breadcrumb-bar" class="bg-navy-800/60 border-b border-slate-700/50 px-6 py-2 flex items-center gap-2 text-sm">
        <span class="text-slate-500">現在の表示:</span>
        <span id="bc-job" class="bc-chip bc-chip-job">介護職/ヘルパー</span>
        <span class="text-slate-600">›</span>
        <span id="bc-pref" class="bc-chip bc-chip-area">全国</span>
        <span id="bc-muni-sep" class="text-slate-600 hidden">›</span>
        <span id="bc-muni" class="bc-chip bc-chip-area hidden"></span>
    </div>

    <main id="content" role="tabpanel" aria-label="タブコンテンツ" class="p-6" style="position:relative;min-height:200px;">
        <div class="text-center text-slate-400 py-20">
            <p class="text-lg">読み込み中...</p>
        </div>
    </main>

    <script src="/static/js/tabcache.js"></script>
    <script src="/static/js/app.js"></script>
    <script src="/static/js/charts.js"></script>
    <script src="/static/js/maps.js"></script>
    <script src="/static/js/export.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            htmx.ajax('GET', '/tab/overview', {target: '#content', swap: 'innerHTML'});

            // ----- フィルタ操作中スピナー（UX-C2） -----
            var filterSelects = ['job-type-select', 'pref-select', 'muni-select'];
            function showFilterSpinner() {
                var content = document.getElementById('content');
                if (!content || document.getElementById('filter-overlay')) return;
                var overlay = document.createElement('div');
                overlay.id = 'filter-overlay';
                overlay.className = 'filter-loading-overlay';
                var spinner = document.createElement('div');
                spinner.className = 'filter-spinner';
                overlay.appendChild(spinner);
                content.appendChild(overlay);
                filterSelects.forEach(function(id) {
                    var el = document.getElementById(id);
                    if (el) el.disabled = true;
                });
            }
            function hideFilterSpinner() {
                var overlay = document.getElementById('filter-overlay');
                if (overlay) overlay.remove();
                filterSelects.forEach(function(id) {
                    var el = document.getElementById(id);
                    if (el) el.disabled = false;
                });
            }
            // HTMX afterSwap で確実にスピナーを除去
            document.body.addEventListener('htmx:afterSwap', function(evt) {
                if (evt.detail.target && evt.detail.target.id === 'content') {
                    hideFilterSpinner();
                }
            });

            // ----- タブスクロールインジケータ（UX-C3） -----
            (function() {
                var nav = document.getElementById('tab-nav');
                var fadeL = document.getElementById('tab-fade-left');
                var fadeR = document.getElementById('tab-fade-right');
                var arrowL = document.getElementById('tab-arrow-left');
                var arrowR = document.getElementById('tab-arrow-right');
                if (!nav) return;

                function updateScrollFades() {
                    var sl = nav.scrollLeft;
                    var atLeft = sl <= 2;
                    var atRight = sl + nav.clientWidth >= nav.scrollWidth - 2;

                    if (fadeL) fadeL.classList.toggle('tab-scroll-fade-hidden', atLeft);
                    if (arrowL) arrowL.classList.toggle('tab-scroll-fade-hidden', atLeft);
                    if (fadeR) fadeR.classList.toggle('tab-scroll-fade-hidden', atRight);
                    if (arrowR) arrowR.classList.toggle('tab-scroll-fade-hidden', atRight);
                }

                nav.addEventListener('scroll', updateScrollFades, {passive: true});
                window.addEventListener('resize', updateScrollFades);
                // 初回チェック
                updateScrollFades();

                // 矢印クリックでスクロール
                if (arrowL) arrowL.addEventListener('click', function() {
                    nav.scrollBy({left: -200, behavior: 'smooth'});
                });
                if (arrowR) arrowR.addEventListener('click', function() {
                    nav.scrollBy({left: 200, behavior: 'smooth'});
                });
            })();

            // ブレッドクラム更新（switchLocationからも呼ぶためグローバル）
            window.updateBreadcrumb = function() {
                var jobSel = document.getElementById('job-type-select');
                var prefSel = document.getElementById('pref-select');
                var muniSel = document.getElementById('muni-select');
                var bcJob = document.getElementById('bc-job');
                var bcPref = document.getElementById('bc-pref');
                var bcMuni = document.getElementById('bc-muni');
                var bcMuniSep = document.getElementById('bc-muni-sep');

                if (jobSel && bcJob) {
                    bcJob.textContent = jobSel.options[jobSel.selectedIndex].text;
                }
                if (prefSel && bcPref) {
                    bcPref.textContent = prefSel.value ? prefSel.options[prefSel.selectedIndex].text : '全国';
                    // 全国なら地域チップのスタイルを薄く
                    bcPref.classList.toggle('bc-chip-area-active', !!prefSel.value);
                }
                if (bcMuni && bcMuniSep) {
                    var selectedMunis = window.getSelectedMunicipalities ? window.getSelectedMunicipalities() : [];
                    if (selectedMunis.length > 0) {
                        bcMuni.textContent = selectedMunis.length <= 2 ? selectedMunis.join(', ') : selectedMunis[0] + ' 他' + (selectedMunis.length - 1) + '件';
                        bcMuni.classList.remove('hidden');
                        bcMuniSep.classList.remove('hidden');
                    } else {
                        bcMuni.classList.add('hidden');
                        bcMuniSep.classList.add('hidden');
                    }
                }
            }

            // 初回表示時にブレッドクラム更新
            updateBreadcrumb();

            // アクティブタブ再読み込み共通関数
            function reloadActiveTab() {
                var activeBtn = document.querySelector('.tab-btn.active');
                if (activeBtn) {
                    var url = activeBtn.getAttribute('hx-get');
                    htmx.ajax('GET', url, {target: '#content', swap: 'innerHTML'});
                }
            }

            // セレクトボックスのオプション安全更新（サーバーから返されるoption要素のみ許可）
            function safeSetOptions(selectEl, optionHtml, defaultOption) {
                while (selectEl.options.length > 0) { selectEl.remove(0); }
                var def = document.createElement('option');
                def.value = '';
                def.textContent = defaultOption;
                selectEl.appendChild(def);
                if (optionHtml) {
                    var tmp = document.createElement('select');
                    tmp.insertAdjacentHTML('afterbegin', optionHtml);
                    while (tmp.firstChild) { selectEl.appendChild(tmp.firstChild); }
                }
                selectEl.selectedIndex = 0;
            }

            // 職種切り替え
            var jobSelect = document.getElementById('job-type-select');
            if (jobSelect) {
                jobSelect.addEventListener('change', function() {
                    showFilterSpinner();
                    if (window.clearTabCache) window.clearTabCache();
                    var jt = this.value;
                    fetch('/api/set_job_type', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                        body: 'job_type=' + encodeURIComponent(jt)
                    }).then(function() {
                        return fetch('/api/prefectures?job_type=' + encodeURIComponent(jt));
                    }).then(function(r) { return r.text(); }).then(function(html) {
                        safeSetOptions(document.getElementById('pref-select'), html, '全国');
                        safeSetOptions(document.getElementById('muni-select'), '', 'すべて');
                        if (window.resetMuniSelection) window.resetMuniSelection();
                        updateBreadcrumb();
                        reloadActiveTab();
                    }).catch(function() { hideFilterSpinner(); });
                });
            }

            // 都道府県切り替え
            var prefSelect = document.getElementById('pref-select');
            if (prefSelect) {
                prefSelect.addEventListener('change', function() {
                    showFilterSpinner();
                    if (window.clearTabCache) window.clearTabCache();
                    var pref = this.value;
                    fetch('/api/set_prefecture', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                        body: 'prefecture=' + encodeURIComponent(pref)
                    }).then(function() {
                        if (pref) {
                            return fetch('/api/municipalities_cascade?prefecture=' + encodeURIComponent(pref));
                        } else {
                            return Promise.resolve({ text: function() { return ''; } });
                        }
                    }).then(function(r) { return r.text(); }).then(function(html) {
                        safeSetOptions(document.getElementById('muni-select'), html, 'すべて');
                        if (window.resetMuniSelection) window.resetMuniSelection();
                        updateBreadcrumb();
                        reloadActiveTab();
                    }).catch(function() { hideFilterSpinner(); });
                });
            }

            // --- 市区町村マルチセレクト（チップ方式） ---
            (function() {
                var muniSel = document.getElementById('muni-select');
                var chipsEl = document.getElementById('muni-chips');
                if (!muniSel || !chipsEl) return;

                var selected = []; // [{value, text}]

                // チップ描画
                function renderChips() {
                    chipsEl.innerHTML = '';
                    selected.forEach(function(item) {
                        var chip = document.createElement('span');
                        chip.className = 'muni-chip';
                        chip.textContent = item.text;
                        var x = document.createElement('button');
                        x.type = 'button';
                        x.className = 'muni-chip-x';
                        x.textContent = '×';
                        x.title = item.text + ' を解除';
                        x.addEventListener('click', function() {
                            removeItem(item.value);
                        });
                        chip.appendChild(x);
                        chipsEl.appendChild(chip);
                    });
                    if (selected.length > 1) {
                        var clearBtn = document.createElement('button');
                        clearBtn.type = 'button';
                        clearBtn.className = 'muni-chip-clear';
                        clearBtn.textContent = '全解除';
                        clearBtn.addEventListener('click', function() {
                            selected = [];
                            renderChips();
                            applySelection();
                        });
                        chipsEl.appendChild(clearBtn);
                    }
                }

                function removeItem(value) {
                    selected = selected.filter(function(s) { return s.value !== value; });
                    renderChips();
                    applySelection();
                }

                function applySelection() {
                    var muniValue = selected.map(function(s) { return s.value; }).join(',');
                    showFilterSpinner();
                    if (window.clearTabCache) window.clearTabCache();
                    fetch('/api/set_municipality', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                        body: 'municipality=' + encodeURIComponent(muniValue)
                    }).then(function() {
                        updateBreadcrumb();
                        reloadActiveTab();
                    }).catch(function() { hideFilterSpinner(); });
                }

                // プルダウンで選択 → チップに追加
                muniSel.addEventListener('change', function() {
                    var val = this.value;
                    if (!val) {
                        // 「すべて」選択 → 全チップ解除
                        if (selected.length > 0) {
                            selected = [];
                            renderChips();
                            applySelection();
                        }
                        return;
                    }
                    // 既に選択済みなら何もしない
                    if (selected.some(function(s) { return s.value === val; })) {
                        this.selectedIndex = 0;
                        return;
                    }
                    var text = this.options[this.selectedIndex].text;
                    selected.push({value: val, text: text});
                    this.selectedIndex = 0; // プルダウンを「すべて」に戻す
                    renderChips();
                    applySelection();
                });

                // グローバル関数
                window.getSelectedMunicipalities = function() {
                    return selected.map(function(s) { return s.text; });
                };
                window.resetMuniSelection = function() {
                    selected = [];
                    renderChips();
                };
                window.setMuniSelection = function(values) {
                    selected = [];
                    (values || []).forEach(function(v) {
                        for (var i = 0; i < muniSel.options.length; i++) {
                            if (muniSel.options[i].value === v) {
                                selected.push({value: v, text: muniSel.options[i].text});
                                break;
                            }
                        }
                    });
                    renderChips();
                };
            })();
        });
        function setActiveTab(el) {
            document.querySelectorAll('.tab-btn').forEach(function(btn) {
                btn.classList.remove('active');
                btn.setAttribute('aria-selected', 'false');
                btn.setAttribute('tabindex', '-1');
            });
            el.classList.add('active');
            el.setAttribute('aria-selected', 'true');
            el.setAttribute('tabindex', '0');
            // タブ切替時にスケルトンを即座表示（キャッシュヒット時は上書きされる）
            var url = el.getAttribute('hx-get');
            if (typeof window.showTabSkeleton === 'function') window.showTabSkeleton(url);
        }
        // キーボードナビゲーション（左右矢印キー）
        document.addEventListener('keydown', function(e) {
            if (e.target.classList.contains('tab-btn')) {
                var tabs = Array.from(document.querySelectorAll('.tab-btn'));
                var idx = tabs.indexOf(e.target);
                if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
                    e.preventDefault();
                    var next = e.key === 'ArrowRight' ? (idx + 1) % tabs.length : (idx - 1 + tabs.length) % tabs.length;
                    tabs[next].focus();
                    tabs[next].click();
                }
            }
        });

        // 流入/流出地域クリックでプルダウンを切り替え
        function switchLocation(pref, muni) {
            if (!pref) return;
            if (window.clearTabCache) window.clearTabCache();
            showFilterSpinner();

            // Step 1: セッションに都道府県を設定
            fetch('/api/set_prefecture', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: 'prefecture=' + encodeURIComponent(pref)
            }).then(function() {
                // Step 2: 市区町村カスケード取得
                return fetch('/api/municipalities_cascade?prefecture=' + encodeURIComponent(pref));
            }).then(function(r) { return r.text(); }).then(function(html) {
                // Step 3: 都道府県ドロップダウン更新
                var prefSelect = document.getElementById('pref-select');
                for (var i = 0; i < prefSelect.options.length; i++) {
                    if (prefSelect.options[i].value === pref) {
                        prefSelect.selectedIndex = i;
                        break;
                    }
                }

                // Step 4: 市区町村hidden select更新（MutationObserverがマルチセレクトを同期）
                safeSetOptions(document.getElementById('muni-select'), html, 'すべて');

                if (muni) {
                    // Step 5: マルチセレクトで該当市区町村を選択
                    if (window.setMuniSelection) window.setMuniSelection([muni]);
                    fetch('/api/set_municipality', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                        body: 'municipality=' + encodeURIComponent(muni)
                    }).then(function() {
                        if (window.updateBreadcrumb) window.updateBreadcrumb();
                        var activeBtn = document.querySelector('.tab-btn.active');
                        if (activeBtn) {
                            var url = activeBtn.getAttribute('hx-get');
                            htmx.ajax('GET', url, {target: '#content', swap: 'innerHTML'});
                        }
                    });
                } else {
                    if (window.resetMuniSelection) window.resetMuniSelection();
                    fetch('/api/set_municipality', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                        body: 'municipality='
                    }).then(function() {
                        if (window.updateBreadcrumb) window.updateBreadcrumb();
                        var activeBtn = document.querySelector('.tab-btn.active');
                        if (activeBtn) {
                            var url = activeBtn.getAttribute('hx-get');
                            htmx.ajax('GET', url, {target: '#content', swap: 'innerHTML'});
                        }
                    });
                }
            });
        }
    </script>
</body>
</html>
